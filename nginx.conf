server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  resolver 127.0.0.11 valid=30s ipv6=off;
  proxy_connect_timeout 5s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  location = /modules/aawm-tap/remoteEntry.js {
    set $aawm_tap_dashboard http://aawm-tap-dashboard:80;
    rewrite ^/modules/aawm-tap/(.*)$ /$1 break;
    proxy_pass $aawm_tap_dashboard;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    add_header Cache-Control "no-store" always;
  }

  location ^~ /modules/aawm-tap/ {
    set $aawm_tap_dashboard http://aawm-tap-dashboard:80;
    rewrite ^/modules/aawm-tap/(.*)$ /$1 break;
    proxy_pass $aawm_tap_dashboard;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
  }

  location /api/aawm-tap/ {
    set $shell_report_api http://dashboard-shell-reports:3010;
    proxy_pass $shell_report_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
  }

  location /api/shell/ {
    set $shell_report_api http://dashboard-shell-reports:3010;
    proxy_pass $shell_report_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

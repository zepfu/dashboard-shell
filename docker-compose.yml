services:
  dashboard-shell:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    image: dashboard-shell:local
    ports:
      - "${DASHBOARD_SHELL_PORT:-3005}:80"
    depends_on:
      aawm-tap-dashboard:
        condition: service_healthy
      dashboard-shell-reports:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aawm_tap

  dashboard-shell-reports:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.report-service
    image: dashboard-shell-reports:local
    environment:
      AAWM_TAP_API_KEY: "${AAWM_TAP_API_KEY:-}"
      AAWM_TAP_ACCESS_TOKEN: "${AAWM_TAP_ACCESS_TOKEN:-}"
      AAWM_TAP_ADMIN_CAPABILITY: "${AAWM_TAP_ADMIN_CAPABILITY:-}"
      AAWM_TAP_API_TARGET: "${AAWM_TAP_API_TARGET:-http://host.docker.internal:8010}"
      VITE_API_KEY: "${VITE_API_KEY:-}"
      VITE_ACCESS_TOKEN: "${VITE_ACCESS_TOKEN:-}"
      VITE_TAP_ACCESS_TOKEN: "${VITE_TAP_ACCESS_TOKEN:-}"
      VITE_TAP_API_KEY: "${VITE_TAP_API_KEY:-}"
      DATABASE_URL: "${DATABASE_URL:-}"
      SHELL_REPORT_DATABASE_HOST_REWRITE: "${SHELL_REPORT_DATABASE_HOST_REWRITE:-aawm-postgres18}"
      SHELL_REPORT_DATABASE_PORT_REWRITE: "${SHELL_REPORT_DATABASE_PORT_REWRITE:-5432}"
      SHELL_REPORT_DB_POOL_MAX: "${SHELL_REPORT_DB_POOL_MAX:-12}"
      SHELL_REPORT_DB_DISABLE_PARALLELISM: "${SHELL_REPORT_DB_DISABLE_PARALLELISM:-true}"
      SHELL_REPORT_SQL_FANOUT_CONCURRENCY: "${SHELL_REPORT_SQL_FANOUT_CONCURRENCY:-2}"
      SHELL_REPORT_PORT: "3010"
      SHELL_REPORT_REDIS_URL: "${SHELL_REPORT_REDIS_URL:-redis://dashboard-shell-redis:6379}"
      SHELL_REPORT_CACHE_PREFIX: "${SHELL_REPORT_CACHE_PREFIX:-dashboard-shell:reports}"
      SHELL_REPORT_CACHE_STALE_TTL_MS: "${SHELL_REPORT_CACHE_STALE_TTL_MS:-86400000}"
      SHELL_REPORT_CACHE_LOCK_TTL_MS: "${SHELL_REPORT_CACHE_LOCK_TTL_MS:-1800000}"
      SHELL_REPORT_CACHE_LOCK_WAIT_MS: "${SHELL_REPORT_CACHE_LOCK_WAIT_MS:-60000}"
      SHELL_REPORT_CACHE_PREWARM: "${SHELL_REPORT_CACHE_PREWARM:-true}"
      SHELL_REPORT_CACHE_PREWARM_INTERVAL_MS: "${SHELL_REPORT_CACHE_PREWARM_INTERVAL_MS:-900000}"
      SHELL_REPORT_CACHE_PREWARM_LOCK_TTL_MS: "${SHELL_REPORT_CACHE_PREWARM_LOCK_TTL_MS:-7200000}"
    expose:
      - "3010"
    depends_on:
      dashboard-shell-redis:
        condition: service_healthy
    volumes:
      - ./server:/app/server:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3010/api/shell/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aawm_tap
      - aawm_core

  dashboard-shell-redis:
    restart: unless-stopped
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--save",
        "",
        "--appendonly",
        "no",
        "--maxmemory",
        "${SHELL_REPORT_REDIS_MAXMEMORY:-512mb}",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    networks:
      - aawm_tap

  aawm-tap-dashboard:
    restart: unless-stopped
    build:
      context: ../aawm-tap-dashboard
      dockerfile: Dockerfile
    image: aawm-tap-dashboard:local
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/remoteEntry.js >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - aawm_tap

networks:
  aawm_tap:
    name: aawm-tap_default
    external: true
  aawm_core:
    name: aawm_default
    external: true

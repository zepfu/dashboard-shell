<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon_light.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon_light.png"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Shadcn Admin</title>
    <meta name="title" content="Shadcn Admin" />
    <meta
      name="description"
      content="Admin Dashboard UI built with Shadcn and Vite."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shadcn-admin.netlify.app" />
    <meta property="og:title" content="Shadcn Admin" />
    <meta
      property="og:description"
      content="Admin Dashboard UI built with Shadcn and Vite."
    />
    <meta
      property="og:image"
      content="https://shadcn-admin.netlify.app/images/shadcn-admin.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://shadcn-admin.netlify.app" />
    <meta property="twitter:title" content="Shadcn Admin" />
    <meta
      property="twitter:description"
      content="Admin Dashboard UI built with Shadcn and Vite."
    />
    <meta
      property="twitter:image"
      content="https://shadcn-admin.netlify.app/images/shadcn-admin.png"
    />

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@1,56;1,72&display=block"
      rel="stylesheet"
    />

    <meta name="theme-color" content="#fff" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      ;(() => {
        if (!['localhost', '127.0.0.1'].includes(window.location.hostname)) {
          return
        }

        const errors = []
        window.__dashboardShellBootstrapErrors = errors

        const toText = (value) => {
          if (value === undefined || value === null) return ''
          if (typeof value === 'string') return value
          if (value.stack) return String(value.stack)
          if (value.message) return String(value.message)

          try {
            return JSON.stringify(value)
          } catch {
            return String(value)
          }
        }

        const record = (type, event) => {
          errors.push({
            type,
            message: toText(event.error ?? event.reason ?? event.message),
            source: event.filename ?? event.target?.src ?? '',
            line: event.lineno ?? '',
            column: event.colno ?? '',
            time: new Date().toISOString(),
          })
        }

        window.addEventListener('error', (event) => record('error', event))
        window.addEventListener('unhandledrejection', (event) =>
          record('unhandledrejection', event)
        )

        window.setTimeout(() => {
          const root = document.getElementById('root')
          if (!root || root.childElementCount > 0) return

          const scripts = Array.from(document.scripts)
            .map((script) => script.src)
            .filter(Boolean)

          const panel = document.createElement('main')
          panel.style.cssText =
            'box-sizing:border-box;min-height:100vh;padding:32px;font:14px/1.5 Inter,system-ui,sans-serif;background:#09090b;color:#fafafa;'
          panel.innerHTML = `
            <section style="max-width:900px;margin:0 auto;border:1px solid #3f3f46;border-radius:8px;padding:20px;background:#18181b">
              <h1 style="margin:0 0 8px;font-size:20px">Dashboard bootstrap did not mount</h1>
              <p style="margin:0 0 16px;color:#d4d4d8">The dev HTML loaded, but React did not populate <code>#root</code>. Share the details below with the agent.</p>
              <h2 style="margin:18px 0 8px;font-size:14px">Captured errors</h2>
              <pre style="white-space:pre-wrap;overflow:auto;margin:0;padding:12px;border-radius:6px;background:#09090b;color:#f4f4f5">${escapeHtml(
                JSON.stringify(errors, null, 2)
              )}</pre>
              <h2 style="margin:18px 0 8px;font-size:14px">Module scripts</h2>
              <pre style="white-space:pre-wrap;overflow:auto;margin:0;padding:12px;border-radius:6px;background:#09090b;color:#f4f4f5">${escapeHtml(
                scripts.join('\n')
              )}</pre>
            </section>
          `
          root.replaceChildren(panel)
        }, 5000)

        function escapeHtml(value) {
          return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;')
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
